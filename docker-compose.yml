services:
  bot:
    build: .
    container_name: trading-bot
    volumes:
      - ./config/config.yaml:/app/config/config.yaml:ro
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - TZ=UTC
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
