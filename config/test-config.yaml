exchanges:
  binance:
    enabled: true
  bybit:
    enabled: true
    api_key: "${BYBIT_API_KEY}"
    secret: "${BYBIT_SECRET}"

collectors:
  interval_seconds: 45
  timeframe: 3m                  # таймфрейм свечей (1m, 5m, 15m, 1h)

strategy:
  min_volume_usdt: 1000000       # минимальный суточный объём в USDT
  exclude_coins:                 # монеты, исключаемые из сканирования (без /USDT)
    - BTC
    - ETH
    - BNB
    - SOL
    - XRP
    # Скамные монеты, которые часто дают ложные сигналы из-за низкой ликвидности
    - HBAR
    - EWY
    - DEXE
    - HOLO
    - WHITEWHALE
  baseline_bars: 70             # свечей для расчёта нормального объёма
  volume_surge_mult: 10.0       # во сколько раз объём должен превысить норму
  sustain_bars: 3               # сколько свечей подряд выше порога для сигнала
  oi_slope_min_pct: 3.0         # минимальный наклон OI, %
  price_growth_min_pct: 0.5     # минимальный рост цены за sustain-окно, %
  price_growth_max_pct: 8.0     # максимальный рост цены (фильтр «уже поздно»), 0 = выкл

telegram:
  bot_token: "${TELEGRAM_BOT_TOKEN}"
  chat_ids:
    - "${TELEGRAM_CHAT_ID}"

trading:
  mode: real                      # signal | virtual | real
  exchange: bybit                 # биржа для торговли
  max_positions: 10               # максимум одновременных позиций
  leverage: 10                    # кредитное плечо
  risk_per_trade_pct: 1.0         # % от депозита, которым рискуем за один стоп
  risk_reward_ratio: 3.0          # соотношение TP/SL (3.0 = 1:3)
  stop_loss_pct: 4.0              # стоп-лосс, % от цены входа
  max_hold_hours: 48.0            # макс. время удержания, часов
  partial_close_enabled: true     # частичная фиксация (всегда включена)
  partial_close_pct: 50.0         # % пути до TP для закрытия / перевода в б/у
  breakeven_at_halfway: false     # перевести стоп в б/у на полпути (без частичной фиксации)
  cooldown_hours: 1.0             # кулдаун после закрытия позиции