exchanges:
  binance:
    enabled: true
  bybit:
    enabled: true
    api_key: "${BYBIT_API_KEY}"
    secret: "${BYBIT_SECRET}"
    testnet: false

# coins: если список пуст — все монеты с бирж отбираются динамически
#   по объёму и исключениям. Можно указать конкретные пары:
# coins:
#   - BTC/USDT
#   - ETH/USDT
coins: []

collectors:
  interval_seconds: 45
  timeframe: 3m                  # таймфрейм свечей (1m, 5m, 15m, 1h)

strategy:
  min_volume_usdt: 1000000       # минимальный суточный объём в USDT
  exclude_coins:                 # монеты, исключаемые из сканирования (без /USDT)
    - BTC
    - ETH
    - BNB
    - SOL
    - XRP
    # Скамные монеты, которые часто дают ложные сигналы из-за низкой ликвидности
    - HBAR
    - EWY
    - DEXE
    - HOLO
    - WHITEWHALE
    - ESPORTS
  baseline_bars: 70             # свечей для расчёта нормального объёма
  volume_surge_mult: 10.0        # во сколько раз объём должен превысить норму
  min_baseline_volume_usdt: 1000 # мин. медиана объёма в USDT, 0 = выкл
  sustain_bars: 3               # сколько свечей подряд выше порога для сигнала
  oi_slope_min_pct: 1.0         # минимальный наклон OI, %
  price_growth_min_pct: 1.0     # минимальный рост цены за sustain-окно, %
  price_growth_max_pct: 20.0    # максимальный рост цены (фильтр «уже поздно»), 0 = выкл
  max_hourly_drop_pct: 10.0     # макс. падение за час (защита от рагпулов), 0 = выкл

strategy_price_surge:                    # детектор пампов по чистой цене (только сигналы)
  price_surge_pct: 5.0        # рост цены в % для сигнала
  price_surge_minutes: 18       # промежуток времени в минутах

telegram:
  bot_token: "${TELEGRAM_BOT_TOKEN}"
  chat_ids:
    - "${TELEGRAM_CHAT_ID}"

telegram_price_surge:                    # отдельный бот для strategy_price_surge
  bot_token: "${TELEGRAM_PRICE_SURGE_BOT_TOKEN}"
  chat_ids:
    - "${TELEGRAM_PRICE_SURGE_CHAT_ID}"

trading:
  mode: real                      # signal | virtual | real
  exchange: bybit                 # биржа для торговли
  max_positions: 10               # максимум одновременных позиций
  position_size_usdt: 10.0        # объём позиции в USDT (не маржа!)
  position_size_pct: 20.0         # % от депозита (0 = использовать position_size_usdt)
  leverage: 10                    # кредитное плечо
  take_profit_pct: 12.0           # тейк-профит, %
  stop_loss_pct: 5.0              # стоп-лосс, %
  max_hold_hours: 48.0            # макс. время удержания, часов
  partial_close_enabled: true     # частичная фиксация на полпути к TP (+ стоп в б/у)
  partial_close_pct: 50.0         # % пути до TP для закрытия / перевода в б/у
  breakeven_at_halfway: false     # перевести стоп в б/у на полпути (без частичной фиксации)