exchanges:
  binance:
    enabled: true
  bybit:
    enabled: true
    api_key: "${BYBIT_API_KEY}"
    secret: "${BYBIT_SECRET}"
    testnet: false

# coins: если список пуст — все монеты с бирж отбираются динамически
#   по объёму и исключениям. Можно указать конкретные пары:
# coins:
#   - BTC/USDT
#   - ETH/USDT
coins: []

collectors:
  interval_seconds: 45
  timeframe: 3m                  # таймфрейм свечей (1m, 5m, 15m, 1h)

strategy:
  min_volume_usdt: 1000000       # минимальный суточный объём в USDT
  exclude_coins:                 # монеты, исключаемые из сканирования (без /USDT)
    - BTC
    - ETH
    - BNB
    - SOL
    - XRP
    # Скамные монеты, которые часто дают ложные сигналы из-за низкой ликвидности
    - HBAR
    - EWY
    - DEXE
    - HOLO
    - WHITEWHALE
    - ESPORTS
    - LA
  baseline_bars: 70              # свечей для расчёта нормального объёма
  volume_surge_mult: 15.0        # во сколько раз объём должен превысить норму
  min_baseline_volume_usdt: 3000 # мин. медиана объёма в USDT, 0 = выкл
  sustain_bars: 4                # сколько свечей подряд выше порога для сигнала
  oi_slope_min_pct: 1.0          # минимальный наклон OI, %
  smooth_max_ratio: 5.0           # макс. отношение макс/медиана объёма (отсекает спайки)
  dump_volume_mult: 3.0           # защита от свечей-выбросов, 0 = выкл
  price_growth_min_pct: 1.0      # минимальный рост цены за sustain-окно, %
  price_growth_max_pct: 12.0     # страховочный потолок роста цены, 0 = выкл
  exhaustion_gain_pct: 5.0       # порог роста для exhaustion-фильтра
  exhaustion_pos_ratio: 0.7      # позиция закрытия свечи (0=low, 1=high)
  wick_rejection_ratio: 0        # макс. доля верхнего фитиля (0 = выкл)
  wick_rejection_min_surge: 100.0 # миним. surge для обхода wick-фильтра
  max_hourly_drop_pct: 10.0      # макс. падение за час (защита от рагпулов), 0 = выкл
  cautious_volume_surge_mult_increase_pct: 50.0  # +50% к volume_surge_mult в CAUTIOUS режиме

strategy_price_surge:                    # детектор пампов по чистой цене (только сигналы)
  price_surge_pct: 5.0           # рост цены в % для сигнала
  price_surge_minutes: 18        # промежуток времени в минутах

telegram:
  bot_token: "${TELEGRAM_BOT_TOKEN}"
  chat_ids:
    - "${TELEGRAM_CHAT_ID}"

telegram_price_surge:                    # отдельный бот для strategy_price_surge
  bot_token: "${TELEGRAM_PRICE_SURGE_BOT_TOKEN}"
  chat_ids:
    - "${TELEGRAM_PRICE_SURGE_CHAT_ID}"

market_context:
  enabled: true                   # включить рыночный контекст
  btc_drop_threshold_pct: 1.5     # порог падения BTC за час для cautious/risk-off, %
  trend_threshold_pct: 1.0        # порог изменения цены за 4ч для определения тренда, %
  supertrend_atr_period: 10       # период ATR для Supertrend
  supertrend_multiplier: 3.0      # множитель ATR для Supertrend
  altcoin_sample_size: 30         # сколько топ-альтов для OTHERS proxy
  notify_on_change: true          # уведомления о смене тренда в Telegram

trading:
  mode: real                      # signal | virtual | real
  exchange: bybit                 # биржа для торговли
  max_positions: 10               # максимум одновременных позиций
  position_size_usdt: 10.0        # объём позиции в USDT (не маржа!)
  position_size_pct: 20.0         # % от депозита (0 = использовать position_size_usdt)
  leverage: 10                    # кредитное плечо
  take_profit_pct: 15.0           # тейк-профит, % (не используется при use_atr_stops)
  stop_loss_pct: 5.0              # бюджет риска в % от position_size_usdt
  max_hold_hours: 48.0            # макс. время удержания, часов
  partial_close_enabled: true     # частичная фиксация (всегда включена)
  partial_close_pct: 50.0         # % пути до TP для закрытия / перевода в б/у
  breakeven_at_halfway: false     # перевести стоп в б/у на полпути (без частичной фиксации)
  cooldown_hours: 1.0             # кулдаун после закрытия позиции (было 24ч)
  # ATR-based стопы
  use_atr_stops: true             # использовать ATR-based TP/SL
  atr_period: 14                  # период ATR
  atr_sl_multiplier: 1.5          # стоп-лосс = ATR × множитель
  atr_tp_multiplier: 4.5          # тейк-профит = ATR × множитель (1:3 risk/reward с SL=1.5)
