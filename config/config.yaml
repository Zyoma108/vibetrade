exchanges:
  binance:
    enabled: true
  bybit:
    enabled: true
    api_key: "${BYBIT_API_KEY}"
    secret: "${BYBIT_SECRET}"

collectors:
  interval_seconds: 15
  timeframe: 3m                  # таймфрейм свечей (1m, 5m, 15m, 1h)

strategy:
  min_volume_usdt: 1000000       # минимальный суточный объём в USDT
  exclude_coins:                 # монеты, исключаемые из сканирования (без /USDT)
    - BTC
    - ETH
    - BNB
    - SOL
    - XRP
    # Скамные монеты, которые часто дают ложные сигналы из-за низкой ликвидности
    - HBAR
    - EWY
    - DEXE
    - HOLO
    - WHITEWHALE
    - ESPORTS
    - LA
    # US-токены — требуют ByBit agreement, не сканируем
    - META
    - AMAT
    - KLAC
    - AAPL
    - AXTI
    - BE
    - COIN
    - DELL
    - DRAM
    - GOOGL
    - HOOD
    - LITE
    - MSTR
    - NBIS
    - RKLB
    - SKHY
    - SNXX
    - SPCX
  baseline_bars: 70              # свечей для расчёта нормального объёма
  volume_surge_mult: 5.0         # во сколько раз объём должен превысить норму
  min_baseline_volume_usdt: 5000 # мин. медиана объёма в USDT, 0 = выкл
  sustain_bars: 4                # сколько свечей подряд выше порога для сигнала
  oi_slope_min_pct: 2.0          # минимальный наклон OI, % (1→2: жёстче подтверждение)
  smooth_max_ratio: 5.0           # макс. отношение макс/медиана объёма (отсекает спайки)
  dump_volume_mult: 0.0           # защита от свечей-выбросов (0 = выкл)
  price_growth_min_pct: 1.0      # минимальный рост цены за sustain-окно, %
  price_growth_max_pct: 12.0     # страховочный потолок роста цены, 0 = выкл
  exhaustion_gain_pct: 5.0       # порог роста для exhaustion-фильтра
  exhaustion_pos_ratio: 0.7      # позиция закрытия свечи (0=low, 1=high)
  max_hourly_drop_pct: 10.0      # макс. падение за час (защита от рагпулов), 0 = выкл
  pre_surge_max_pct: 8.0         # макс. рост за 30 мин до sustain-окна (0 = выкл)
  cautious_volume_surge_mult_increase_pct: 50.0  # +50% к volume_surge_mult в CAUTIOUS режиме

strategy_price_surge:                    # детектор пампов по чистой цене (только сигналы)
  price_surge_pct: 5.0           # рост цены в % для сигнала
  price_surge_minutes: 18        # промежуток времени в минутах

telegram:
  bot_token: "${TELEGRAM_BOT_TOKEN}"
  chat_ids:
    - "${TELEGRAM_CHAT_ID}"

telegram_price_surge:                    # отдельный бот для strategy_price_surge
  bot_token: "${TELEGRAM_PRICE_SURGE_BOT_TOKEN}"
  chat_ids:
    - "${TELEGRAM_PRICE_SURGE_CHAT_ID}"

market_context:
  enabled: true                   # включить рыночный контекст
  btc_drop_threshold_pct: 1.5     # порог падения BTC за час для cautious/risk-off, %
  trend_threshold_pct: 1.0        # порог изменения цены за 4ч для определения тренда, %
  supertrend_atr_period: 10       # период ATR для Supertrend
  supertrend_multiplier: 3.0      # множитель ATR для Supertrend

trading:
  mode: real                      # signal | real
  exchange: bybit                 # биржа для торговли
  max_positions: 10               # максимум одновременных позиций
  leverage: 10                    # кредитное плечо
  risk_per_trade_pct: 0.6         # % от депозита, которым рискуем за один стоп
  risk_reward_ratio: 2.0          # соотношение TP/SL (2.0 = 1:2 risk/reward, TP=+10%)
  stop_loss_pct: 5.0              # стоп-лосс, % от цены входа
  max_hold_hours: 48.0            # макс. время удержания, часов
  partial_close_pct: 35.0         # % пути до TP для закрытия / перевода в б/у
  cooldown_hours: 1.0             # кулдаун после закрытия позиции
  circuit_breaker_enabled: true    # защита от серий убытков (Circuit Breaker)
  circuit_breaker_loss_streak_reduce: 2  # после N убытков подряд уменьшить размер позиции
  circuit_breaker_reduce_mult_pct: 50.0  # множитель размера позиции при срабатывании, %
  circuit_breaker_loss_streak_stop: 3    # после N убытков подряд полностью остановить
  circuit_breaker_stop_minutes: 60       # на сколько минут остановить торговлю
  taker_fee_pct: 0.055             # комиссия тейкера (market-ордер), % от notional
  maker_fee_pct: 0.02              # комиссия мейкера (лимитный reduce-only ордер), % от notional
  backtest_slippage_pct: 0.3       # допущение на проскальзывание входа в бэктесте, % (0 = выкл)
  pending_entry_pullback_pct: 1.5   # вход лимитником на откате от сигнала, % (0 = выкл, market сразу)
  pending_entry_timeout_minutes: 9.0  # через сколько минут снять неисполненный лимитник входа

# ИИ-режим: оркестратор-скилл (.claude/skills/vibetrade-agent-loop, автономный /loop) + сабагенты
# entry-agent/reeval-agent оценивают те же сигналы и торгуют на ОТДЕЛЬНОМ аккаунте биржи,
# параллельно алгоритмической торговле (которая не меняется). LLM вызывается через Claude Code
# (подписка), API-ключ Anthropic не нужен. Выключено по умолчанию — см. AGENTS.md, "ИИ-режим".
agent:
  enabled: false                       # включить ИИ-режим (доп. режим, не заменяет алгоритм)
  dry_run: false                        # true = агент только логирует решения, сделки не открываются даже на своём аккаунте
  exchange: bybit                      # биржа отдельного аккаунта ИИ-режима
  api_key: "${AGENT_BYBIT_API_KEY}"     # ОТДЕЛЬНЫЙ аккаунт, не путать с trading.*
  secret: "${AGENT_BYBIT_SECRET}"
  model: sonnet                        # модель Claude для сабагентов entry-agent/reeval-agent
  entry_gate_enabled: true             # агент решает, открывать ли сделку по сигналу
  reeval_enabled: true                 # агент периодически переоценивает свои открытые позиции
  reeval_interval_minutes: 20.0        # раз во сколько минут переоценивать одну позицию (сверяет оркестратор)
  watch_interval_seconds: 30           # раз во сколько секунд обновлять цену монет под наблюдением (независимо от общего цикла сканирования)
  max_hold_extension_hours: 12.0       # макс. продление удержания за раз, часов
  max_hold_extension_total_hours: 24.0 # макс. суммарное продление на сделку, часов
  allow_sl_tighten: true               # разрешить агенту подтягивать стоп (ослаблять нельзя никогда)
  allow_early_close: true              # разрешить агенту закрывать позицию досрочно
  daily_call_budget: 200               # макс. запусков сабагентов в сутки (сверяет оркестратор)
  entry_symbol_cooldown_minutes: 30.0  # после решения entry-agent по монете — не переоценивать новые сигналы по ней это время (сверяет оркестратор)
