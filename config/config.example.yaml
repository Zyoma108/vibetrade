exchanges:
  binance:
    enabled: true
  bybit:
    enabled: true
    # api_key: "your-api-key"    # для реальной торговли
    # secret: "your-secret"
    # testnet: true              # true = testnet, false = mainnet

# coins: если список пуст — все монеты с бирж отбираются динамически
#   по объёму и исключениям. Можно указать конкретные пары:
# coins:
#   - BTC/USDT
#   - ETH/USDT
coins: []

collectors:
  interval_seconds: 60
  timeframe: 5m                  # таймфрейм свечей (1m, 5m, 15m, 1h)

strategy:
  min_volume_usdt: 200000       # минимальный суточный объём в USDT
  exclude_coins:                # монеты, исключаемые из сканирования (без /USDT)
    - BTC
    - ETH
    - BNB
    - SOL
    - XRP
  baseline_bars: 50             # свечей для расчёта нормального объёма
  volume_surge_mult: 2.0        # во сколько раз объём должен превысить норму
  sustain_bars: 4               # сколько свечей подряд выше порога для сигнала
  oi_slope_min_pct: 2.0         # минимальный наклон OI, %
  price_growth_min_pct: 1.0     # минимальный рост цены за sustain-окно, %
  price_growth_max_pct: 5.0     # максимальный рост цены (фильтр «уже поздно»), 0 = выкл

telegram:
  bot_token: "${TELEGRAM_BOT_TOKEN}"
  chat_ids:
    # Поддерживаются: числовой ID (строка), @username канала, отрицательный ID
    # Как узнать ID канала: перешлите сообщение из канала боту @getidsbot
    - "@my_channel"

trading:
  mode: signal                    # signal | virtual | real
  exchange: bybit                 # биржа для торговли
  max_positions: 10               # максимум одновременных позиций
  position_size_usdt: 100.0       # объём позиции в USDT (не маржа!)
  position_size_pct: 0.0          # % от депозита (0 = использовать position_size_usdt)
  leverage: 1                    # кредитное плечо
  take_profit_pct: 12.0           # тейк-профит, %
  stop_loss_pct: 4.0              # стоп-лосс, %
  max_hold_hours: 24.0            # макс. время удержания, часов
  partial_close_enabled: false    # частичная фиксация на полпути к TP
  partial_close_pct: 50.0         # % пути до TP для частичного закрытия
  breakeven_after_partial: true   # перевести стоп в безубыток после частичного закрытия
  breakeven_at_halfway: false     # перевести стоп в б/у на полпути (без частичной фиксации)
