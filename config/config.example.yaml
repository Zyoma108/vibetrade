exchanges:
  binance:
    enabled: true
  bybit:
    enabled: true
    # api_key: "${BYBIT_API_KEY}"   # из .env файла
    # secret: "${BYBIT_SECRET}"

collectors:
  interval_seconds: 60
  timeframe: 5m                  # таймфрейм свечей (1m, 5m, 15m, 1h)

strategy:
  min_volume_usdt: 200000       # минимальный суточный объём в USDT
  exclude_coins:                # монеты, исключаемые из сканирования (без /USDT)
    - BTC
    - ETH
    - BNB
    - SOL
    - XRP
  baseline_bars: 50             # свечей для расчёта нормального объёма
  volume_surge_mult: 2.0        # во сколько раз объём должен превысить норму
  min_baseline_volume_usdt: 0    # мин. медиана объёма в USDT, 0 = выкл
  sustain_bars: 4               # сколько свечей подряд выше порога для сигнала
  oi_slope_min_pct: 2.0         # минимальный наклон OI, %
  price_growth_min_pct: 1.0     # минимальный рост цены за sustain-окно, %
  price_growth_max_pct: 12.0    # страховочный потолок роста цены, 0 = выкл
  exhaustion_gain_pct: 5.0     # порог роста для exhaustion-фильтра
  exhaustion_pos_ratio: 0.7    # позиция закрытия свечи (0=low,1=high) для exhaustion
  max_hourly_drop_pct: 10.0     # макс. падение за час (защита от рагпулов), 0 = выкл

strategy_price_surge:                    # детектор пампов по чистой цене (только сигналы)
  price_surge_pct: 10.0        # рост цены в % для сигнала
  price_surge_minutes: 9       # промежуток времени в минутах

telegram:
  bot_token: "${TELEGRAM_BOT_TOKEN}"
  chat_ids:
    - "@my_channel"

telegram_price_surge:                    # отдельный бот для strategy_price_surge
  bot_token: "${TELEGRAM_BOT_TOKEN_2}"
  chat_ids:
    - "@my_channel_2"

market_context:
  enabled: true                   # включить рыночный контекст
  btc_drop_threshold_pct: 1.5     # порог падения BTC за час для cautious/risk-off, %
  trend_threshold_pct: 1.0        # порог изменения цены за 4ч для определения тренда (bullish/bearish), %
  supertrend_atr_period: 10       # период ATR для Supertrend
  supertrend_multiplier: 3.0      # множитель ATR для Supertrend
  altcoin_sample_size: 30         # сколько топ-альтов для OTHERS proxy
  notify_on_change: true          # уведомления о смене тренда в Telegram

trading:
  mode: signal                    # signal | virtual | real
  exchange: bybit                 # биржа для торговли
  max_positions: 10               # максимум одновременных позиций
  leverage: 1                     # кредитное плечо
  risk_per_trade_pct: 1.0         # % от депозита, которым рискуем за один стоп
  risk_reward_ratio: 3.0          # соотношение TP/SL (3.0 = 1:3)
  stop_loss_pct: 5.0              # стоп-лосс, % от цены входа
  max_hold_hours: 24.0            # макс. время удержания, часов
  partial_close_enabled: true     # частичная фиксация (всегда включена)
  partial_close_pct: 50.0         # % пути до TP для закрытия / перевода в б/у
  breakeven_at_halfway: false     # перевести стоп в б/у на полпути (без частичной фиксации)
  cooldown_hours: 1.0             # кулдаун после закрытия позиции
